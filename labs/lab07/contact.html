<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab07: Tables and Forms</title>
    <link rel="stylesheet" href="stylesheet_lab07.css">
</head>
<body>
    <nav>
        <a href="tierlist.html">Tier List</a>
        <a href="contact.html">Contact Us</a>
    </nav>

    <header>
        <h1>Submit Your Soccer Feedback</h1>
    </header>

    <main>
        <form action="#" method="post">
            <p>
                <label for="user-name">Full Name:</label>
                <input type="text" id="user-name" name="user-name" required>
            </p>

            <p>
                <label for="user-email">Email Address:</label>
                <input type="email" id="user-email" name="user-email" required>
            </p>

            <p>
                <label for="favorite-league">Which league is the most competitive?</label><br>
                <select id="favorite-league" name="favorite-league">
                    <option value="epl">English Premier League</option>
                    <option value="laliga">La Liga</option>
                    <option value="bundesliga">Bundesliga</option>
                    <option value="seriea">Serie A</option>
                </select>
            </p>

            <fieldset>
                <legend>Do you agree with the "CL Tier" rankings?</legend>
                <input type="radio" id="agree-yes" name="agreement" value="yes">
                <label for="agree-yes">Yes, they are elite.</label><br>
                <input type="radio" id="agree-no" name="agreement" value="no">
                <label for="agree-no">No, some teams are overrated.</label>
            </fieldset>

            <p>
                <strong>Which trophies matter most? (Check all that apply)</strong><br>
                <input type="checkbox" id="ucl" name="trophy" value="ucl">
                <label for="ucl">Champions League</label><br>
                <input type="checkbox" id="epl-title" name="trophy" value="epl-title">
                <label for="epl-title">Premier League Title</label><br>
                <input type="checkbox" id="fa-cup" name="trophy" value="fa-cup">
                <label for="fa-cup">FA Cup</label>
            </p>

            <p>
                <label for="comments">Additional Comments:</label><br>
                <textarea id="comments" name="comments" rows="4" cols="40"></textarea>
            </p>

            <p>
                <button type="submit">Submit Feedback</button>
            </p>
        </form>
    </main>
</body>
</html>
